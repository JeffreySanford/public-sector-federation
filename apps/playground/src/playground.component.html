<main class="playground">
  <header>
    <div>
      <ps-tag value="Visual QA" tone="info" />
      <h1>Public Sector PrimeNG preset</h1>
      <p>Standalone visual QA for tokens, preset mapping, and dark mode.</p>
    </div>
    <ps-button
      [label]="theme.isDark() ? 'Light mode' : 'Dark mode'"
      [outlined]="true"
      (buttonClick)="theme.toggleDarkMode()"
    />
  </header>

  <section class="grid">
    <ps-card header="Controls">
      <label for="name">Applicant name</label>
      <input id="name" value="Jordan Avery" />

      <label for="status">Status</label>
      <select id="status" [(ngModel)]="status">
        @for (option of statuses; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>

      <ps-button label="Open dialog" icon="pi pi-window-maximize" (buttonClick)="visible = true" />
    </ps-card>

    <ps-card header="Data table">
      <table>
        <thead>
          <tr>
            <th>Component</th>
            <th>Layer</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          @for (row of rows; track row.name) {
            <tr>
              <td>{{ row.name }}</td>
              <td>{{ row.layer }}</td>
              <td><ps-tag [value]="row.state" tone="success" /></td>
            </tr>
          }
        </tbody>
      </table>
    </ps-card>
  </section>
</main>

<ps-dialog header="Preset dialog" [(visible)]="visible">
  <p>Dialog surface, border, text, and focus styles come from the shared preset.</p>
</ps-dialog>
