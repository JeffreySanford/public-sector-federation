<ps-toast />

<section class="remote">
  <div class="remote__header">
    <div>
      <ps-tag value="Remote: Admin" tone="warn" />
      <h2>Administrative settings</h2>
      <p>
        Configure platform controls, review administrative actions, and send
        operational feedback from the remote console.
      </p>
    </div>
    <ps-button label="Open dialog" icon="pi pi-window-maximize" (activated)="openDialog()" />
  </div>

  <div class="remote__grid">
    <ps-card header="Platform controls">
      <div class="setting-row">
        <ps-checkbox label="Audit logging" variant="switch" [(checked)]="auditLogging" />
      </div>
      <div class="setting-row">
        <ps-checkbox label="Maintenance mode" variant="switch" [(checked)]="maintenanceMode" />
      </div>

      <ps-input
        fieldId="temporaryPassword"
        label="Temporary password"
        type="password"
        placeholder="Generate or enter password"
        [(value)]="temporaryPassword"
      />

      <ps-button label="Save settings" icon="pi pi-save" (activated)="showToast()" />
    </ps-card>

    <ps-card header="Administrative actions">
      <nav class="admin-actions-menu" aria-label="Administrative actions">
        @for (action of actions; track action.label) {
          <ps-button
            [label]="action.label"
            [icon]="action.icon"
            intent="secondary"
            appearance="text"
            (activated)="action.command()"
          />
        }
      </nav>
    </ps-card>
  </div>
</section>

<ps-dialog header="Remote dialog" [(visible)]="visible" width="32rem">
  <p>
    This dialog is opened from the admin remote and follows the shared overlay
    policy above shell chrome.
  </p>
  <div ps-dialog-footer>
    <ps-button label="Close" appearance="text" (activated)="closeDialog()" />
    <ps-button label="Confirm" icon="pi pi-check" (activated)="confirmDialog()" />
  </div>
</ps-dialog>
