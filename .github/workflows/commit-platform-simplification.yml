name: Commit platform simplification

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  simplify:
    if: github.head_ref == 'agent/dialog-documentation'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/dialog-documentation
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Apply simplification
        shell: bash
        run: |
          python scripts/simplify-platform.py
          git checkout HEAD -- .github/workflows

      - name: Refresh lockfile
        run: pnpm install --lockfile-only

      - name: Confirm removed platform
        shell: bash
        run: |
          set -euxo pipefail
          test ! -e apps/agile-api
          test ! -e docker-compose.yml
          test ! -e prisma.config.ts
          node -e "const p=require('./package.json'); if(p.scripts['start:backend'] || p.dependencies?.['@nestjs/core'] || p.dependencies?.['@prisma/client']) process.exit(1)"

      - name: Commit non-workflow cleanup
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A -- ':!.github/workflows'
          git commit -m 'Remove obsolete API and database platform [platform-simplified]'
          git push origin HEAD:agent/dialog-documentation
