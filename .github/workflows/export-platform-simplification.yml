name: Export platform simplification

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'agent/dialog-documentation'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/dialog-documentation

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Generate simplification
        shell: bash
        run: |
          python scripts/simplify-platform.py
          pnpm install --lockfile-only
          mkdir -p artifacts/platform-simplification
          cp package.json pnpm-lock.yaml README.md artifacts/platform-simplification/
          mkdir -p artifacts/platform-simplification/scripts artifacts/platform-simplification/docs artifacts/platform-simplification/.github/workflows
          cp scripts/lint-workspace.mjs artifacts/platform-simplification/scripts/
          cp docs/TESTING.md docs/PORTFOLIO-OVERVIEW.md artifacts/platform-simplification/docs/
          cp .github/workflows/component-manifest.yml artifacts/platform-simplification/.github/workflows/
          git diff --name-status > artifacts/platform-simplification/changed-files.txt
          git diff --binary > artifacts/platform-simplification/platform-simplification.patch

      - name: Upload generated cleanup
        uses: actions/upload-artifact@v4
        with:
          name: platform-simplification-generated
          path: artifacts/platform-simplification
          if-no-files-found: error
