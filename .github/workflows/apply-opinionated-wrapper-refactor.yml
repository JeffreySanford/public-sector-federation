name: Apply Opinionated Wrapper Refactor

on:
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/apply-opinionated-wrapper-refactor.yml'
      - 'scripts/apply-opinionated-wrapper-refactor.mjs'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/opinionated-wrapper-contracts
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Apply refactor
        shell: bash
        run: |
          set -o pipefail
          node scripts/apply-opinionated-wrapper-refactor.mjs 2>&1 | tee refactor.log

      - name: Upload refactor diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opinionated-wrapper-refactor-diagnostics
          path: refactor.log
          if-no-files-found: warn

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm api:prisma:generate

      - name: Validate manifest and workspace
        shell: bash
        run: |
          set -o pipefail
          {
            pnpm manifest:check
            pnpm lint
            pnpm typecheck
            pnpm build-storybook:qa
          } 2>&1 | tee validation.log

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opinionated-wrapper-validation-diagnostics
          path: validation.log
          if-no-files-found: warn

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run built Storybook gate
        shell: bash
        run: |
          set -o pipefail
          node scripts/storybook-e2e.mjs 2>&1 | tee storybook-gate.log

      - name: Upload Storybook gate diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opinionated-wrapper-storybook-diagnostics
          path: |
            storybook-gate.log
            dist/storybook/qa-remote/index.json
          if-no-files-found: warn

      - name: Commit refactor
        run: |
          git config user.name "OpenAI ChatGPT"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/ui-patterns apps/qa-remote docs scripts
          git commit -m "feat: add opinionated PrimeNG wrapper contract"
          git push origin HEAD:feature/opinionated-wrapper-contracts
