name: Release Quality Gate

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'apps/**'
      - 'docs/**'
      - 'packages/**'
      - 'scripts/**'
      - 'README.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'nx.json'
      - 'playwright.config.ts'
      - 'tsconfig.base.json'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/**'
      - 'apps/**'
      - 'docs/**'
      - 'packages/**'
      - 'scripts/**'
      - 'README.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'nx.json'
      - 'playwright.config.ts'
      - 'tsconfig.base.json'
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

concurrency:
  group: release-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Static, build, documentation, Storybook, and browser gates
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # Chromatic needs enough history to compare against the previous
          # baseline; a shallow clone can leave it unable to find one.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate component manifest
        run: pnpm manifest:check

      - name: Build portable manifest
        run: pnpm manifest:build

      - name: Verify generated manifest is current
        run: git diff --exit-code -- packages/ui-patterns/generated/component-manifest.json

      - name: Build component usage audit
        run: pnpm usage:build

      - name: Upload component audit artifacts
        uses: actions/upload-artifact@v7
        with:
          name: component-audit
          path: artifacts/component-audit/component-usage-report.json
          if-no-files-found: error

      - name: Upload component manifest
        uses: actions/upload-artifact@v7
        with:
          name: component-manifest
          path: packages/ui-patterns/generated/component-manifest.json
          if-no-files-found: error

      - name: Run workspace lint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee lint.log

      - name: Validate documentation links
        shell: bash
        run: |
          set -o pipefail
          pnpm lint:links 2>&1 | tee links.log

      - name: Typecheck projects
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee typecheck.log

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee unit-tests.log

      - name: Build production projects
        shell: bash
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee build.log

      - name: Build QA Storybook
        run: pnpm build-storybook:qa

      - name: Publish Storybook to Chromatic
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        shell: bash
        run: |
          # `secrets` cannot be referenced in an `if:` conditional, so the
          # "skip until the secret is configured" check has to live here
          # instead, to avoid hard-failing every push to master.
          if [ -z "$CHROMATIC_PROJECT_TOKEN" ]; then
            echo "CHROMATIC_PROJECT_TOKEN is not set; skipping Chromatic publish."
            exit 0
          fi
          pnpm chromatic

      - name: Install Chromium for pull-request validation
        if: github.event_name == 'pull_request'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install full browser matrix
        if: github.event_name != 'pull_request'
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Run Starlight designer-grade quality gate
        shell: bash
        run: |
          set -o pipefail
          pnpm quality:starlight 2>&1 | tee starlight-quality.log

      - name: Upload Starlight preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: starlight-preview
          path: dist/apps/starlight
          if-no-files-found: error

      - name: Run built Storybook accessibility gate
        shell: bash
        run: |
          set -o pipefail
          pnpm storybook:e2e 2>&1 | tee storybook-e2e.log

      - name: Run Chromium pull-request gate
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -o pipefail
          pnpm exec playwright test --project=chromium --workers=1 2>&1 | tee e2e.log

      - name: Run full cross-browser release gate
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -o pipefail
          pnpm test:e2e 2>&1 | tee e2e.log

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-quality-diagnostics
          path: |
            lint.log
            links.log
            typecheck.log
            unit-tests.log
            build.log
            starlight-quality.log
            storybook-e2e.log
            e2e.log
            artifacts/lighthouse/
            playwright-report/
            test-results/
            dist/apps/starlight/
            dist/storybook/qa-remote/index.json
          if-no-files-found: warn
