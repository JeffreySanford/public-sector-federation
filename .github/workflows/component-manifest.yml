name: Component Manifest

on:
  pull_request:
    paths:
      - '.github/workflows/component-manifest.yml'
      - 'apps/qa-remote/**'
      - 'docs/design-system/**'
      - 'packages/ui-patterns/**'
      - 'scripts/build-component-manifest.mjs'
      - 'scripts/lint-workspace.mjs'
      - 'scripts/storybook-e2e.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'

permissions:
  contents: read

jobs:
  validate:
    name: Manifest, lint, and Storybook
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate component manifest
        run: pnpm manifest:check

      - name: Build portable manifest
        run: pnpm manifest:build

      - name: Upload component manifest
        uses: actions/upload-artifact@v4
        with:
          name: component-manifest
          path: packages/ui-patterns/generated/component-manifest.json
          if-no-files-found: error

      - name: Run workspace lint
        run: pnpm lint

      - name: Typecheck projects
        run: pnpm typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: warn

      - name: Build QA Storybook
        run: pnpm build-storybook:qa

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run built Storybook accessibility gate
        shell: bash
        run: |
          set -o pipefail
          node scripts/storybook-e2e.mjs 2>&1 | tee storybook-e2e.log

      - name: Upload Storybook e2e diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-e2e-diagnostics
          path: |
            storybook-e2e.log
            dist/storybook/qa-remote/index.json
          if-no-files-found: warn
