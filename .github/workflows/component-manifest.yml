name: Release Quality Gate

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'apps/**'
      - 'docs/**'
      - 'packages/**'
      - 'scripts/**'
      - 'README.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'nx.json'
      - 'playwright.config.ts'
      - 'tsconfig.base.json'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/**'
      - 'apps/**'
      - 'docs/**'
      - 'packages/**'
      - 'scripts/**'
      - 'README.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'nx.json'
      - 'playwright.config.ts'
      - 'tsconfig.base.json'
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

concurrency:
  group: release-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Static, build, documentation, Storybook, and browser gates
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm api:prisma:generate

      - name: Validate component manifest
        run: pnpm manifest:check

      - name: Build portable manifest
        run: pnpm manifest:build

      - name: Verify generated manifest is current
        run: git diff --exit-code -- packages/ui-patterns/generated/component-manifest.json

      - name: Upload component manifest
        uses: actions/upload-artifact@v4
        with:
          name: component-manifest
          path: packages/ui-patterns/generated/component-manifest.json
          if-no-files-found: error

      - name: Run workspace lint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee lint.log

      - name: Validate documentation links
        run: pnpm lint:links

      - name: Typecheck projects
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee typecheck.log

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee unit-tests.log

      - name: Build production projects
        shell: bash
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee build.log

      - name: Build QA Storybook
        run: pnpm build-storybook:qa

      - name: Install Chromium for pull-request validation
        if: github.event_name == 'pull_request'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install full browser matrix
        if: github.event_name != 'pull_request'
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Run Starlight designer-grade quality gate
        shell: bash
        run: |
          set -o pipefail
          pnpm quality:starlight 2>&1 | tee starlight-quality.log

      - name: Upload Starlight preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: starlight-preview
          path: dist/apps/starlight
          if-no-files-found: error

      - name: Start Docker-backed API
        shell: bash
        run: |
          set -o pipefail
          pnpm start:backend 2>&1 | tee backend.log

      - name: Run built Storybook accessibility gate
        shell: bash
        run: |
          set -o pipefail
          node scripts/storybook-e2e.mjs 2>&1 | tee storybook-e2e.log

      - name: Run Chromium pull-request gate
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -o pipefail
          pnpm exec playwright test --project=chromium --workers=1 2>&1 | tee e2e.log

      - name: Run full cross-browser release gate
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -o pipefail
          pnpm test:e2e 2>&1 | tee e2e.log

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-quality-diagnostics
          path: |
            lint.log
            typecheck.log
            unit-tests.log
            build.log
            starlight-quality.log
            backend.log
            storybook-e2e.log
            e2e.log
            artifacts/lighthouse/
            playwright-report/
            test-results/
            dist/apps/starlight/
            dist/storybook/qa-remote/index.json
          if-no-files-found: warn

      - name: Stop Docker-backed API
        if: always()
        continue-on-error: true
        run: pnpm docker:down
