name: Component Manifest

on:
  pull_request:
    paths:
      - '.github/workflows/component-manifest.yml'
      - 'apps/**'
      - 'docs/design-system/**'
      - 'packages/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'nx.json'
      - 'playwright.config.ts'
      - 'tsconfig.base.json'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/component-manifest.yml'
      - 'apps/**'
      - 'docs/design-system/**'
      - 'packages/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'nx.json'
      - 'playwright.config.ts'
      - 'tsconfig.base.json'

concurrency:
  group: component-contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Contract, unit, Storybook, and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm api:prisma:generate

      - name: Validate component manifest
        run: pnpm manifest:check

      - name: Build portable manifest
        run: pnpm manifest:build

      - name: Verify generated manifest is current
        run: git diff --exit-code -- packages/ui-patterns/generated/component-manifest.json

      - name: Upload component manifest
        uses: actions/upload-artifact@v4
        with:
          name: component-manifest
          path: packages/ui-patterns/generated/component-manifest.json
          if-no-files-found: error

      - name: Run workspace lint
        run: pnpm lint

      - name: Typecheck projects
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: warn

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee unit-tests.log

      - name: Upload unit test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-diagnostics
          path: unit-tests.log
          if-no-files-found: warn

      - name: Build QA Storybook
        run: pnpm build-storybook:qa

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Run built Storybook accessibility gate
        shell: bash
        run: |
          set -o pipefail
          node scripts/storybook-e2e.mjs 2>&1 | tee storybook-e2e.log

      - name: Upload Storybook e2e diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-e2e-diagnostics
          path: |
            storybook-e2e.log
            dist/storybook/qa-remote/index.json
          if-no-files-found: warn

      - name: Run full E2E suite
        shell: bash
        run: |
          set -o pipefail
          pnpm e2e 2>&1 | tee e2e.log

      - name: Upload E2E diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: |
            e2e.log
            playwright-report/
            test-results/
          if-no-files-found: warn
