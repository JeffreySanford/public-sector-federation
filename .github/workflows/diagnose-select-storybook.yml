name: Diagnose Select Storybook contract

on:
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/diagnose-select-storybook.yml'

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build generated token artifacts
        run: pnpm build:tokens

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Select test and preserve output
        shell: bash
        run: |
          set +e
          pnpm exec playwright test apps/qa-remote/e2e/select.storybook.spec.ts --project=chromium --retries=0 --workers=1 --timeout=15000 2>&1 | tee select-storybook-diagnostics.txt
          status=${PIPESTATUS[0]}
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f select-storybook-diagnostics.txt
          git commit -m "Capture Select Storybook diagnostics"
          git pull --rebase origin ${{ github.event.pull_request.head.ref }}
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          exit "$status"
