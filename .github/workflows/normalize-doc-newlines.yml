name: Normalize documentation newlines

on:
  push:
    branches:
      - docs/documentation-upgrade-package

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: docs/documentation-upgrade-package
          fetch-depth: 0

      - name: Normalize Markdown file endings
        shell: python
        run: |
          from pathlib import Path

          files = [
              Path('docs/documentation-upgrade/11-prioritized-backlog.md'),
              Path('docs/documentation-upgrade/12-delivery-roadmap.md'),
              Path('docs/documentation-upgrade/17-astro-starlight-application-and-designer-quality-gate.md'),
          ]

          for path in files:
              content = path.read_text(encoding='utf-8')
              path.write_text(content.rstrip('\n') + '\n', encoding='utf-8')

      - name: Commit normalized endings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/documentation-upgrade/11-prioritized-backlog.md \
                  docs/documentation-upgrade/12-delivery-roadmap.md \
                  docs/documentation-upgrade/17-astro-starlight-application-and-designer-quality-gate.md
          if git diff --cached --quiet; then
            echo "No newline changes required."
          else
            git commit -m "Fix trailing newlines in documentation plans"
            git push origin HEAD:docs/documentation-upgrade-package
          fi
