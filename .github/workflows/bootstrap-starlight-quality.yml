name: Bootstrap Starlight quality assets

on:
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/bootstrap-starlight-quality.yml'
      - 'apps/starlight/**'
      - 'scripts/validate-starlight-quality.mjs'
      - 'scripts/update-starlight-visuals.mjs'
      - 'package.json'

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out the pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Resolve the quality-gate dependency lock
        run: pnpm install --no-frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build Starlight
        run: pnpm build:starlight

      - name: Validate content and integrity contracts
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm validate:starlight 2>&1 | tee starlight-validator.log

      - name: Preserve validator diagnostics
        if: steps.validate.outcome == 'failure'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git add -f starlight-validator.log
          git commit -m "Record Starlight validator diagnostics"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          exit 1

      - name: Generate the initial reviewed visual baselines
        if: steps.validate.outcome == 'success'
        run: pnpm test:starlight:visual:update

      - name: Commit the lockfile and visual baselines
        if: steps.validate.outcome == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml apps/starlight/tests/e2e/*-snapshots/
          if git diff --cached --quiet; then
            echo "No bootstrap assets changed."
            exit 0
          fi
          git commit -m "Add Starlight quality baselines"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
