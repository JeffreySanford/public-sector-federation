          - [x] Document the provider-neutral `PublicSelectOption` model and private PrimeNG mapping.
          - [x] Document combobox semantics, accessible naming, keyboard navigation, selection, and focus behavior.
          - [x] Cover selected, disabled, empty-option, disabled-option, long-option, and model-binding states.
          - [x] Prove body-appended overlay positioning, clipping, stacking, and responsive behavior.
          - [x] Prove light and dark theme inheritance for the body-appended overlay.
          - [x] Add dedicated Storybook interaction and Playwright evidence instead of relying only on shared shell token checks.
          - [x] Record missing invalid-state, required-state, help-text, richer option-content, manual-review, Figma, and disabled-option ARIA evidence as explicit gaps.
          - [x] Add the Select route, documentation source, canonical story ID, and Storybook source to integrity validation.
          - [x] Update the component registry and generated manifest for the declared Select evidence.
          - [x] Add Select responsive, 200%-zoom-equivalent, axe, accessibility-tree, visual, and Lighthouse coverage.
          - [x] Complete the Select human polish review with a documented follow-up.
          - [ ] Pass the complete Release Quality Gate for the exact final pull-request state.'''
          if old not in text:
              raise SystemExit('Select TODO block was not found.')
          todo.write_text(text.replace(old, new, 1))

          backlog = Path('docs/documentation-upgrade/11-prioritized-backlog.md')
          text = backlog.read_text()
          old = '''### Select

          - [ ] Write purpose and usage guidance.
          - [ ] Create canonical and state stories.
          - [ ] Document overlay and theme behavior.
          - [ ] Document keyboard navigation and selection model.
          - [ ] Document accessible naming and invalid state.
          - [ ] Show provider-neutral API and private PrimeNG mapping.
          - [ ] Add integration evidence for body-appended overlays.
          - [ ] Pass the Starlight designer-grade quality gate and human polish review.'''
          new = '''### Select

          - [x] Write purpose and usage guidance.
          - [x] Create canonical and state stories.
          - [x] Document overlay and theme behavior.
          - [x] Document keyboard navigation and the provider-neutral selection model.
          - [x] Document accessible naming, current invalid-state limitations, and the provider's disabled-option ARIA gap.
          - [x] Show the provider-neutral API and private PrimeNG mapping.
          - [x] Add integration evidence for body-appended overlays, clipping, stacking, focus return, theme inheritance, and mobile wrapping.
          - [x] Complete the Select human polish review.
          - [ ] Pass the complete Release Quality Gate for the exact final pull-request state.'''
          if old not in text:
              raise SystemExit('Select backlog block was not found.')
          backlog.write_text(text.replace(old, new, 1))

          status = Path('docs/documentation-upgrade/00-current-status.md')
          text = status.read_text()
          old = '''## Active slice â€” Select documentation and overlay evidence

          The next slice is **Select documentation plus canonical overlay and keyboard evidence**.

          The slice should:

          - publish `/docs/components/select/` using the proven Button page sequence;
          - keep purpose, selection guidance, and alternatives ahead of implementation evidence;
          - designate a normal canonical Select story and focused state stories;
          - document the public `label`, `options`, `placeholder`, `disabled`, and `value` contract;
          - document the provider-neutral option model and the private PrimeNG implementation boundary;
          - document accessible naming, combobox semantics, keyboard navigation, selection, disabled options, empty options, and long-option behavior;
          - prove body-appended overlay positioning, clipping, stacking, light/dark theme inheritance, and responsive behavior;
          - add dedicated Storybook interaction and Playwright evidence rather than relying only on shared shell token checks;
          - record current limitations honestly, including the absence of invalid-state, help-text, required-state, and richer option-content APIs;
          - update the component registry, generated manifest, documentation-integrity relationships, TODO, and prioritized backlog in the same pull request;
          - pass the existing designer-grade Starlight gate and human polish review.'''
          new = '''## Active slice â€” PR #16 Select documentation and overlay evidence

          PR #16 completes the Select implementation slice and is in final release validation.

          The branch now:

          - publishes `/docs/components/select/` using the proven flagship page sequence;
          - keeps purpose, selection guidance, alternatives, and content guidance ahead of implementation evidence;
          - records a canonical Select story plus selected, disabled, disabled-option, empty, long-option, model-binding, and overlay-boundary stories;
          - documents the public `label`, `options`, `placeholder`, `disabled`, and `value` contract and the private PrimeNG boundary;
          - verifies keyboard opening, navigation, selection, Escape, model updates, disabled behavior, and focus return through eight dedicated Storybook browser tests;
          - proves body-appended overlay relationships, clipping escape, stacking, light/dark token inheritance, and mobile wrapping;
          - adds route, manifest, responsive, 200%-zoom-equivalent, axe, accessibility-tree, visual, and Lighthouse evidence;
          - records invalid-state, required-state, help-text, richer option content, missing disabled-option `aria-disabled`, Figma alignment, and manual assistive-technology review as explicit gaps;
          - has completed human visual review with a follow-up to evaluate reusable evidence components after Dialog.'''
          if old not in text:
              raise SystemExit('Current Select status block was not found.')
          status.write_text(text.replace(old, new, 1))
          PY

      - name: Commit aligned documentation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/starlight/src/content/docs/components/index.md \
            apps/starlight/src/content/docs/components/select/index.mdx \
            docs/design-system/TODO.md \
            docs/documentation-upgrade/00-current-status.md \
            docs/documentation-upgrade/11-prioritized-backlog.md
          git commit -m "Align Select documentation status"
          git pull --rebase origin ${{ github.event.pull_request.head.ref }}
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
