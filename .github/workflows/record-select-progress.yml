name: Record Select documentation progress

on:
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/record-select-progress.yml'

permissions:
  contents: write

jobs:
  align:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Align Select status and evidence language
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          select_page = Path('apps/starlight/src/content/docs/components/select/index.mdx')
          text = select_page.read_text()
          replacements = [
              (
                  '**Lifecycle:** Stable Â· **Framework:** Angular Â· **Provider:** PrimeNG adapter Â· **Accessibility:** Automated evidence exists; dedicated keyboard and manual review remain incomplete Â· **Figma:** Pending access',
                  '**Lifecycle:** Stable Â· **Framework:** Angular Â· **Provider:** PrimeNG adapter Â· **Accessibility:** Automated keyboard, popup, theme, responsive, and page evidence is complete for this declared scope; manual review remains pending Â· **Figma:** Pending access',
              ),
              (
                  '| Long label or option | Supported with responsive evidence pending completion | Allow wrapping where the provider permits; avoid horizontal clipping. |',
                  '| Long label or option | Supported with responsive evidence | The popup is width-constrained and option labels wrap without horizontal document overflow. |',
              ),
              (
                  '- The popup must expose listbox semantics and options must expose selected and disabled states.',
                  '- The popup must expose listbox semantics and options must expose selected state. PrimeNG currently suppresses disabled-option activation through provider state but does not emit `aria-disabled` on the rendered option; that omission remains an explicit accessibility/provider gap.',
              ),
              (
                  '''- **Storybook accessibility:** The canonical story uses the accessibility addon as an error gate.
          - **Page-level accessibility:** This Starlight route will be included in the built-site axe gate.
          - **Keyboard coverage:** Partial until the dedicated Select Storybook Playwright suite is complete.
          - **Overlay integration:** Partial; shared shell token evidence exists, but the Select-specific clipping and focus sequence need dedicated checks.
          - **Manual assistive-technology review:** Pending.
          - **Conformance claim:** None. Automated evidence does not replace manual review.''',
                  '''- **Storybook accessibility:** The canonical story uses the accessibility addon as an error gate.
          - **Page-level accessibility:** This Starlight route is included in the built-site axe gate.
          - **Keyboard coverage:** Complete for the declared stable contract: keyboard opening, option navigation, selection, Escape, model updates, disabled states, and focus return are verified.
          - **Overlay integration:** Complete for the declared scope: body append, clipping escape, stacking, light/dark token inheritance, long-option wrapping, and mobile document width are verified.
          - **Disabled-option ARIA:** The provider prevents selection but currently omits `aria-disabled` on the option element; this remains a recorded gap.
          - **Manual assistive-technology review:** Pending.
          - **Conformance claim:** None. Automated evidence does not replace manual review.''',
              ),
              (
                  '''| State stories | Expanded in this slice | Selected, disabled, disabled option, empty options, long options, model binding, and overlay boundary. |
          | Automated accessibility | Partial | Storybook and page-level checks exist; popup states require dedicated interaction checks. |
          | Keyboard coverage | Partial | Add closed-state, open-state, selection, disabled-option, and Escape tests. |
          | Body-overlay integration | Partial | The dedicated boundary story exists; positioning, clipping, focus, and theme assertions remain active work. |
          | Manual screen-reader review | Pending | Record a named review before making broader accessibility claims. |
          | Token mapping | Partial | Shared semantic and provider mappings exist; dedicated Select component tokens do not. |
          | Figma alignment | Pending access | Do not fabricate component or property identifiers. |
          | Documentation | In progress | This page begins the second flagship component slice. |''',
                  '''| State stories | Complete for the current contract | Selected, disabled, disabled option, empty options, long options, model binding, and overlay boundary are recorded. |
          | Automated accessibility | Complete for the declared automated scope | Storybook, page-level axe, and accessibility-tree checks pass. |
          | Keyboard coverage | Complete for the declared stable contract | Dedicated tests cover opening, navigation, selection, Escape, disabled states, model updates, and focus return. |
          | Body-overlay integration | Complete for the declared scope | Tests prove body append, clipping escape, stacking, theme inheritance, focus return, and mobile wrapping. |
          | Disabled-option ARIA | Provider gap | PrimeNG marks the option disabled internally but does not currently emit `aria-disabled`. |
          | Manual screen-reader review | Pending | Record a named review before making broader accessibility claims. |
          | Token mapping | Partial | Shared semantic and provider mappings exist; dedicated Select component tokens do not. |
          | Figma alignment | Pending access | Do not fabricate component or property identifiers. |
          | Documentation | Complete for this slice | The page, canonical story, integrity relationships, visual baselines, and Lighthouse route are recorded. |''',
              ),
              (
                  '6. **Do not claim completed Figma or manual accessibility approval.** Both remain explicit missing evidence.\n7. **Use Dialog next to test focus-managed overlay documentation.** Select proves listbox navigation and body-overlay behavior; Dialog will prove modal focus containment and restoration.',
                  '6. **Track the disabled-option ARIA omission.** The provider blocks activation but does not currently emit `aria-disabled` on the rendered option.\n7. **Do not claim completed Figma or manual accessibility approval.** Both remain explicit missing evidence.\n8. **Use Dialog next to test focus-managed overlay documentation.** Select proves listbox navigation and body-overlay behavior; Dialog will prove modal focus containment and restoration.',
              ),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Select page status text was not found: {old[:90]}')
              text = text.replace(old, new, 1)
          select_page.write_text(text)

          catalog = Path('apps/starlight/src/content/docs/components/index.md')
          text = catalog.read_text()
          old = '''- **Documentation:** The second flagship page is active and currently expanding its overlay and keyboard evidence.
          - **Lifecycle:** Active.
          - **Storybook:** A canonical story and focused state or overlay harnesses are recorded.
