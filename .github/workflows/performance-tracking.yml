name: Performance Tracking

on:
  workflow_run:
    workflows: ['E2E Tests']
    types:
      - completed

jobs:
  record-performance:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: public_sector
          POSTGRES_PASSWORD: public_sector
          POSTGRES_DB: public_sector_agile
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for git info

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.33.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download test results
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ github.token }}
          workflow: e2e.yml
          run_id: ${{ github.event.workflow_run.id }}
          path: test-results

      - name: Setup database
        env:
          DATABASE_URL: postgresql://public_sector:public_sector@localhost:5432/public_sector_agile
        run: |
          pnpm db:validate
          pnpm api:migrate
          pnpm api:seed

      - name: Start API server
        env:
          DATABASE_URL: postgresql://public_sector:public_sector@localhost:5432/public_sector_agile
        run: |
          pnpm nx run agile-api:build
          node dist/apps/agile-api/main.js &
          sleep 2

      - name: Record performance metrics
        env:
          PERFORMANCE_API_URL: http://localhost:3000
          GIT_COMMIT_HASH: ${{ github.event.workflow_run.head_commit.id }}
          GIT_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: pnpm perf:record

      - name: Check for regressions
        env:
          PERFORMANCE_API_URL: http://localhost:3000
        run: |
          echo "Checking for performance regressions..."
          # This would be extended to fail the build if critical regressions detected
          curl -s http://localhost:3000/api/performance/regressions | jq '.'

      - name: Comment on PR with performance results
        if: ${{ github.event.workflow_run.pull_requests }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.workflow_run.pull_requests[0].number;
            const performanceUrl = `${context.server_url}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📊 **Performance Metrics Recorded**\n\nTest results have been recorded to the performance tracking database. View the [performance dashboard](${performanceUrl}) to track trends over time.`,
            });
