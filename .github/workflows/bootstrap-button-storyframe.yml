name: Bootstrap Button documentation assets

on:
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/bootstrap-button-storyframe.yml'
      - 'apps/qa-remote/src/stories/button.stories.ts'
      - 'apps/starlight/**'
      - 'packages/ui-patterns/src/manifest/component-registry.ts'
      - 'scripts/validate-starlight-quality.mjs'

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch relationship sources
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          registry = Path('packages/ui-patterns/src/manifest/component-registry.ts')
          text = registry.read_text()
          text = text.replace(
              "const buttonStories = ['apps/qa-remote/src/stories/button-tag.acceptance.stories.ts'];",
              "const buttonStories = ['apps/qa-remote/src/stories/button.stories.ts'];",
          )
          old = """    storybookStatus: 'complete',
              storybookTitle: 'Design System/Acceptance/Button and Tag',
              storybookFiles: buttonStories,
              testStatus: 'partial',
              accessibilityPattern: 'button',"""
          new = """    storybookStatus: 'complete',
              storybookTitle: 'Design System/Components/Button',
              storybookFiles: buttonStories,
              stories: [
                'design-system-components-button--default',
                'design-system-components-button--appearance-reference',
                'design-system-components-button--loading',
                'design-system-components-button--disabled',
              ],
              testStatus: 'partial',
              documentationStatus: 'complete',
              documentationFiles: [
                'apps/starlight/src/content/docs/components/button/index.mdx',
                'docs/design-system/components/catalog.md',
                'docs/design-system/architecture/registry-consumption-spec.md',
              ],
              accessibilityPattern: 'button',"""
          if old not in text:
              raise SystemExit('Button manifest seed block was not found.')
          registry.write_text(text.replace(old, new))

          validator = Path('scripts/validate-starlight-quality.mjs')
          text = validator.read_text()
          anchor = """  if (!(await pathExists(path.resolve(workspaceRoot, component.storybookFile)))) {
              report('documentation-integrity.json', `${component.manifestId} Storybook file does not exist: ${component.storybookFile}.`);
            }
            if (!allowedFigmaStatuses.has(component.figmaStatus)) {"""
          replacement = """  if (!(await pathExists(path.resolve(workspaceRoot, component.storybookFile)))) {
              report('documentation-integrity.json', `${component.manifestId} Storybook file does not exist: ${component.storybookFile}.`);
            }
            if (component.canonicalStoryId) {
              if (!/^[a-z0-9-]+--[a-z0-9-]+$/.test(component.canonicalStoryId)) {
                report('documentation-integrity.json', `${component.manifestId} uses an invalid canonical Storybook ID: ${component.canonicalStoryId}.`);
              }
              if (!entry.evidence.storybook.stories.includes(component.canonicalStoryId)) {
                report('documentation-integrity.json', `${component.manifestId} canonical Storybook ID is not recorded in the generated manifest.`);
              }
            }
            if (component.documentationFile) {
              if (!entry.evidence.documentation.files.includes(component.documentationFile)) {
                report('documentation-integrity.json', `${component.manifestId} documentation source is not recorded in the generated manifest.`);
              }
              if (!(await pathExists(path.resolve(workspaceRoot, component.documentationFile)))) {
                report('documentation-integrity.json', `${component.manifestId} documentation source does not exist: ${component.documentationFile}.`);
              }
            }
            if (!allowedFigmaStatuses.has(component.figmaStatus)) {"""
          if anchor not in text:
              raise SystemExit('Starlight validator relationship anchor was not found.')
          text = text.replace(anchor, replacement)
          text = text.replace(
              """const styleFiles = [
            'apps/starlight/astro.config.mjs',
            'apps/starlight/src/styles/custom.css',
          ];""",
              """const styleFiles = [
            'apps/starlight/astro.config.mjs',
            'apps/starlight/src/components/StoryFrame.astro',
            'apps/starlight/src/styles/custom.css',
          ];""",
          )
          validator.write_text(text)
          PY

      - name: Build generated component manifest
        run: pnpm manifest:build

      - name: Validate content and relationships
        run: pnpm validate:starlight

      - name: Build QA Storybook
        run: pnpm build-storybook:qa

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build Starlight
        run: pnpm build:starlight

      - name: Generate and validate visual baselines
        run: pnpm test:starlight:visual:update

      - name: Commit generated relationships and baselines
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/ui-patterns/src/manifest/component-registry.ts
          git add packages/ui-patterns/generated/component-manifest.json
          git add scripts/validate-starlight-quality.mjs
          find apps/starlight/tests/e2e -path '*-snapshots/*.png' -print0 | xargs -0 git add -f
          if git diff --cached --quiet; then
            echo "No generated Button documentation assets changed."
            exit 0
          fi
          git commit -m "Complete Button documentation relationships and baselines"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
