name: Bootstrap Starlight dependencies

on:
  push:
    branches:
      - agent/starlight-foundation
  pull_request:
    branches:
      - master
    paths:
      - apps/starlight/**
      - pnpm-lock.yaml
      - .github/workflows/bootstrap-starlight.yml

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/starlight-foundation
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Resolve Starlight dependencies
        run: |
          pnpm --dir apps/starlight add astro @astrojs/starlight astro-mermaid mermaid sharp
          pnpm --dir apps/starlight add --save-dev @astrojs/check "typescript@~5.9.0"

      - name: Commit dependency resolution
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/starlight/package.json pnpm-lock.yaml
          if git diff --cached --quiet; then
            echo "Dependency files are already current."
          else
            git commit -m "Resolve Starlight dependencies"
            git push origin HEAD:agent/starlight-foundation
          fi

      - name: Validate Starlight foundation
        run: |
          pnpm nx run starlight:check
          pnpm nx build starlight
          pnpm lint
