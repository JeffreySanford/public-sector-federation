name: Mark Button documentation progress

on:
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/mark-button-progress.yml'

permissions:
  contents: write

jobs:
  progress:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update completed backlog items
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          backlog = Path('docs/documentation-upgrade/11-prioritized-backlog.md')
          text = backlog.read_text()
          replacements = {
              '- [ ] Add StoryFrame-specific clipping and embedded-story checks when `StoryFrame` is introduced.': '- [x] Add StoryFrame-specific clipping and embedded-story checks when `StoryFrame` is introduced.',
              '- [ ] Extend accessibility-tree snapshots to navigation and flagship component-page structures.': '- [x] Extend accessibility-tree snapshots to the flagship Button page and StoryFrame structure.',
              '- [ ] Create `StoryFrame`.': '- [x] Create `StoryFrame`.',
              '- [ ] Write purpose and usage guidance.': '- [x] Write purpose and usage guidance.',
              '- [ ] Choose the canonical stable story.': '- [x] Choose the canonical stable story.',
              '- [ ] Document current and proposed public API contracts.': '- [x] Document current and proposed public API contracts.',
              '- [ ] Document variants and interaction states.': '- [x] Document variants and interaction states.',
              '- [ ] Document anatomy.': '- [x] Document anatomy.',
              '- [ ] Document keyboard, focus, loading, and disabled behavior.': '- [x] Document keyboard, focus, loading, and disabled behavior.',
              '- [ ] Show light and dark token mappings.': '- [x] Show light and dark token mappings.',
              '- [ ] Add API table.': '- [x] Add API table.',
              '- [ ] Add quality evidence summary.': '- [x] Add quality evidence summary.',
              '- [ ] Move historical comparison to a final Decisions section.': '- [x] Move historical comparison to a final Decisions section.',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Backlog item was not found: {old}')
              text = text.replace(old, new, 1)
          backlog.write_text(text)

          status = Path('docs/documentation-upgrade/00-current-status.md')
          text = status.read_text()
          text = text.replace(
              'The next implementation slice is **Button documentation plus the reusable `StoryFrame` foundation**.',
              'PR #15 implements **Button documentation plus the reusable `StoryFrame` foundation** and is in final release validation.',
          )
          status.write_text(text)
          PY

      - name: Commit backlog progress
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/documentation-upgrade/00-current-status.md docs/documentation-upgrade/11-prioritized-backlog.md
          git commit -m "Record Button documentation backlog progress"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
