name: Bootstrap platform simplification

on:
  push:
    branches:
      - agent/dialog-documentation

permissions:
  contents: write

jobs:
  simplify:
    if: ${{ !contains(github.event.head_commit.message, '[platform-simplified]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/dialog-documentation
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Remove obsolete backend and performance stack
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf apps/agile-api docs/performance
          rm -f docker-compose.yml prisma.config.ts
          rm -f scripts/ensure-platform.mjs scripts/export-agile-report.mjs scripts/agile-seed-e2e.mjs
          rm -f scripts/record-performance.mjs scripts/export-performance-seed.mjs
          rm -f .github/workflows/manual-perf-record.yml .github/workflows/performance-tracking.yml
          find apps/qa-remote -type f \( -iname '*performance*' -o -iname '*agile*' \) -delete

      - name: Update workspace configuration and current documentation
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          package_path = Path('package.json')
          package = json.loads(package_path.read_text())
          scripts = package['scripts']
          for name in [
              'start:backend', 'start:backend:rebuild', 'start:all:rebuild', 'db:validate',
              'docker:up', 'docker:down', 'docker:logs', 'api:prisma:generate', 'api:migrate',
              'api:seed', 'serve:api', 'check:platform', 'agile:report', 'perf:record',
              'perf:export-seed', 'test:api'
          ]:
              scripts.pop(name, None)
          scripts['start:all'] = 'node ./node_modules/.pnpm/nx@23.0.1/node_modules/nx/dist/bin/nx.js run-many --target=serve --projects=services-remote,reporting-remote,admin-remote,qa-remote,shell,starlight --parallel=6 --outputStyle=stream'
          scripts['report:all'] = 'pnpm verify:smoke && pnpm screenshots:progress && pnpm zeroheight:export && pnpm zip:screenshots'

          for name in ['@types/pg', 'prisma']:
              package.get('devDependencies', {}).pop(name, None)
          for name in [
              '@nestjs/common', '@nestjs/core', '@nestjs/platform-express', '@nestjs/swagger',
              '@prisma/adapter-pg', '@prisma/client', 'chart.js', 'class-transformer',
              'class-validator', 'pg', 'reflect-metadata'
          ]:
              package.get('dependencies', {}).pop(name, None)
          package_path.write_text(json.dumps(package, indent=2) + '\n')

          readme = Path('README.md')
          text = readme.read_text()
          text = text.replace('- a NestJS API backed by Prisma and PostgreSQL\n', '')
          text = text.replace('| `apps/agile-api` | NestJS API with Prisma and PostgreSQL. |\n', '')
          text = text.replace('- Docker Desktop for PostgreSQL and the backend API\n', '')
          text = text.replace('pnpm start:backend\n', '')
          text = text.replace('The shell opens at `http://localhost:4200`. Frontend applications use ports `4200` through `4204`; the QA Storybook uses port `4400`.', 'The shell opens at `http://localhost:4200`. Angular applications use ports `4200` through `4204`, Starlight uses `4321`, and QA Storybook uses `4400`. No database or backend service is required.')
          readme.write_text(text)

          portfolio = Path('docs/PORTFOLIO-OVERVIEW.md')
          text = portfolio.read_text().replace('- NestJS APIs, Prisma, and PostgreSQL\n', '')
          portfolio.write_text(text)

          lint = Path('scripts/lint-workspace.mjs')
          text = lint.read_text()
          text = '\n'.join(line for line in text.splitlines() if 'apps/agile-api/' not in line and "run('pnpm', ['db:validate']);" not in line) + '\n'
          text = text.replace('PrimeNG boundaries, Prisma schema, SCSS guard, and Markdown linting.', 'PrimeNG boundaries, SCSS guard, and Markdown linting.')
          lint.write_text(text)

          workflow = Path('.github/workflows/component-manifest.yml')
          text = workflow.read_text()
          text = re.sub(r"\n      - name: Generate Prisma client\n        run: pnpm api:prisma:generate\n", '\n', text)
          text = re.sub(r"\n      - name: Start Docker-backed API\n        shell: bash\n        run: \|\n          set -o pipefail\n          pnpm start:backend 2>&1 \| tee backend\.log\n", '\n', text)
          text = text.replace('            backend.log\n', '')
          text = re.sub(r"\n      - name: Stop Docker-backed API\n        if: always\(\)\n        continue-on-error: true\n        run: pnpm docker:down\n?", '\n', text)
          workflow.write_text(text)

          testing = Path('docs/TESTING.md')
          text = testing.read_text()
          text = re.sub(r'^.*(?:agile-api|Prisma|PostgreSQL|start:backend|docker:up|docker:down|api:prisma|test:api).*$\n?', '', text, flags=re.MULTILINE | re.IGNORECASE)
          testing.write_text(text)
          PY

      - name: Refresh lockfile
        run: pnpm install --lockfile-only

      - name: Verify simplified workspace
        shell: bash
        run: |
          set -o pipefail
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm lint:links
          pnpm typecheck
          pnpm test
          pnpm manifest:check
          pnpm build
          pnpm test:e2e:list

      - name: Ensure obsolete runtime references are gone
        shell: bash
        run: |
          set -euxo pipefail
          test ! -e apps/agile-api
          test ! -e docker-compose.yml
          test ! -e prisma.config.ts
          ! grep -RInE 'apps/agile-api|start:backend|api:prisma|docker compose up.*agile-api|PerformanceDashboardComponent|PerformanceDataService' \
            package.json README.md scripts apps/qa-remote .github/workflows docs/TESTING.md docs/PORTFOLIO-OVERVIEW.md

      - name: Commit generated cleanup
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Remove obsolete API and database platform [platform-simplified]'
          git push origin HEAD:agent/dialog-documentation
